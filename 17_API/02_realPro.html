<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }

    #posts {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      width: 200px;
      border-radius: 8px;
      box-shadow: 0 0 5px gray;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Posts</h1>
<p id="status"></p>
<button onclick="loadPosts()">Load Posts</button>

<div id="posts"></div>

<script>
function loadPosts(){
  const status = document.getElementById("status");
  const posts = document.getElementById("posts");

  status.innerText = "Loading...";

  fetch("https://jsonplaceholder.typicode.com/posts")
    .then(res => res.json())
    .then(data => {

      let output = "";

      data.slice(0, 6).forEach(post => {
        output += `
          <div class="card">
            <h3>${post.title}</h3>
            <p>${post.body}</p>
          </div>
        `;
      });

      posts.innerHTML = output;
      status.innerText = "Done";
    })
    .catch(error => {
      status.innerText = "Error";
    });
}
</script>

</body>
</html>
